<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AZOTA MASTERPIECE | GDKT&PL 11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* RESET & BIẾN MÀU */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a192f;
            --secondary: #172a45;
            --accent: #64ffda;
            --accent-light: #9efff0;
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(100, 255, 218, 0.1);
            --shadow: 0 20px 40px rgba(0,0,0,0.4);
            --shadow-neon: 0 0 30px rgba(100, 255, 218, 0.3);
            --gradient-1: linear-gradient(135deg, #0a192f, #172a45);
            --gradient-2: linear-gradient(135deg, #64ffda, #9efff0);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* HIỆU ỨNG NỀN 4D */
        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            animation: rotateStars 200s linear infinite;
        }

        .stars::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 190px, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 600px 300px, var(--accent), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 800px 700px, var(--gold), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1000px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(5px 5px at 300px 800px, var(--accent), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 4s ease-in-out infinite;
        }

        @keyframes rotateStars {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* HIỆU ỨNG HẠT LƯỢNG TỬ */
        .quantum-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(2px);
            animation: quantumFloat 10s infinite;
            opacity: 0.3;
        }

        @keyframes quantumFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, -100px) scale(1.5); }
            50% { transform: translate(-50px, 200px) scale(0.5); }
            75% { transform: translate(-150px, -50px) scale(2); }
        }

        /* CONTAINER CHÍNH */
        .master-container {
            max-width: 900px;
            margin: 20px auto;
            position: relative;
            z-index: 10;
            padding: 0 20px;
        }

        /* HEADER SIÊU THỰC */
        .hyper-header {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            animation: headerFloat 6s ease-in-out infinite;
            box-shadow: var(--shadow-neon);
        }

        .hyper-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(100, 255, 218, 0.1) 50%,
                transparent 70%
            );
            animation: shine 8s infinite;
        }

        .hyper-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(100,255,218,0.1), transparent 70%);
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }

        @keyframes shine {
            0% { transform: rotate(0deg) translateY(0); }
            100% { transform: rotate(360deg) translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .hyper-title {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #64ffda, #ffd700, #9efff0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: titleGlitch 5s infinite;
        }

        @keyframes titleGlitch {
            0%, 100% { transform: skew(0deg); opacity: 1; }
            95% { transform: skew(0deg); opacity: 1; }
            96% { transform: skew(5deg); opacity: 0.8; }
            97% { transform: skew(-5deg); opacity: 0.9; }
            98% { transform: skew(0deg); opacity: 1; }
        }

        .hyper-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            letter-spacing: 3px;
            position: relative;
        }

        /* STATS NĂNG LƯỢNG */
        .energy-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .energy-core {
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid var(--accent);
            border-radius: 60px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: corePulse 3s infinite;
        }

        .energy-core::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(100,255,218,0.2), transparent);
            animation: coreSpin 4s linear infinite;
        }

        @keyframes corePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(100,255,218,0.3); }
            50% { box-shadow: 0 0 40px rgba(100,255,218,0.6); }
        }

        @keyframes coreSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .core-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }

        .core-label {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        /* PROGRESS BAR LƯỢNG TỬ */
        .quantum-progress {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.8);
            margin-bottom: 15px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .progress-percent {
            color: var(--accent);
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 0 15px var(--accent);
        }

        .progress-container {
            width: 100%;
            height: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent-light));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: progressGlow 2s infinite;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* CARD CÂU HỎI */
        .quantum-card {
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.5s;
            position: relative;
            overflow: hidden;
        }

        .quantum-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100,255,218,0.1), transparent);
            transition: left 0.5s;
        }

        .quantum-card:hover::before {
            left: 100%;
        }

        .quantum-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(100,255,218,0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .q-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 5px 15px rgba(100,255,218,0.4);
            animation: numberPulse 3s infinite;
        }

        @keyframes numberPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .q-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.6;
            flex: 1;
        }

        /* OPTIONS */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(100,255,218,0.1);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255,255,255,0.9);
        }

        .option:hover {
            background: rgba(100,255,218,0.1);
            border-color: var(--accent);
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 5px 20px rgba(100,255,218,0.2);
        }

        .option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
        }

        .option span {
            font-size: 15px;
        }

        /* STATEMENT ITEMS */
        .statement-item {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .statement-text {
            color: white;
            margin-bottom: 15px;
            font-size: 15px;
            line-height: 1.6;
        }

        .statement-options {
            display: flex;
            gap: 15px;
        }

        .stmt-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(100,255,218,0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-weight: 600;
        }

        .stmt-option:hover {
            background: rgba(100,255,218,0.15);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(100,255,218,0.2);
        }

        .stmt-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        /* SUBMIT BUTTON */
        .submit-wrapper {
            text-align: center;
            margin: 40px 0;
        }

        .quantum-submit {
            padding: 20px 60px;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            border: none;
            border-radius: 60px;
            color: var(--primary);
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(100,255,218,0.4);
        }

        .quantum-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .quantum-submit:hover::before {
            left: 100%;
        }

        .quantum-submit:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(100,255,218,0.6);
        }

        /* DONATE BUTTON */
        .donate-portal {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            color: var(--primary);
            font-size: 32px;
            cursor: pointer;
            z-index: 1000;
            animation: portalPulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes portalPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,215,0,0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px 10px rgba(255,215,0,0.4); }
        }

        /* DONATE MODAL */
        .donate-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .donate-overlay.show {
            display: flex;
            animation: overlayFade 0.3s;
        }

        @keyframes overlayFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .donate-portal-modal {
            background: linear-gradient(135deg, #0a192f, #172a45);
            width: 90%;
            max-width: 450px;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 2px solid var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 50px rgba(100,255,218,0.3);
            animation: modalQuantum 0.5s;
        }

        @keyframes modalQuantum {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .close-portal {
            float: right;
            font-size: 30px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-portal:hover {
            transform: rotate(90deg) scale(1.2);
        }

        .donate-icon {
            font-size: 70px;
            margin: 20px 0;
            animation: quantumHeart 2s infinite;
        }

        @keyframes quantumHeart {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(5deg); }
            50% { transform: scale(1) rotate(0deg); }
            75% { transform: scale(1.2) rotate(-5deg); }
        }

        .bank-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .bank-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(100,255,218,0.3);
            color: white;
        }

        .bank-row:last-child {
            border-bottom: none;
        }

        .bank-label {
            color: var(--accent);
        }

        .bank-value {
            font-weight: 600;
            color: var(--gold);
        }

        .thanks-quantum {
            color: var(--accent);
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            animation: thanksFloat 3s infinite;
        }

        @keyframes thanksFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* RESULT MODAL */
        .result-quantum {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1500;
            align-items: center;
            justify-content: center;
        }

        .result-quantum.show {
            display: flex;
        }

        .result-card-quantum {
            background: linear-gradient(135deg, #0a192f, #172a45);
            width: 90%;
            max-width: 450px;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 2px solid var(--gold);
            animation: resultFloat 0.5s;
        }

        @keyframes resultFloat {
            0% { transform: translateY(50px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .result-score-quantum {
            font-size: 60px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="universe">
        <div class="stars"></div>
    </div>
    
    <div class="quantum-particles" id="particles"></div>

    <div class="master-container">
        <!-- HEADER -->
        <div class="hyper-header">
            <h1 class="hyper-title">GDKT&PL 11</h1>
            <div class="hyper-subtitle">GIỮA KÌ II • 2025-2026</div>
            
            <div class="energy-stats">
                <div class="energy-core">
                    <span class="core-number">50</span>
                    <span class="core-label">TRẮC NGHIỆM</span>
                </div>
                <div class="energy-core">
                    <span class="core-number">7</span>
                    <span class="core-label">ĐÚNG/SAI</span>
                </div>
            </div>
        </div>

        <!-- PROGRESS -->
        <div class="quantum-progress">
            <div class="progress-header">
                <span>NĂNG LƯỢNG HOÀN THÀNH</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- CONTENT -->
        <div id="content"></div>

        <!-- SUBMIT -->
        <div class="submit-wrapper">
            <button class="quantum-submit" onclick="submitExam()">KÍCH HOẠT KẾT QUẢ</button>
        </div>
    </div>

    <!-- DONATE BUTTON -->
    <button class="donate-portal" onclick="showDonate()">❤️</button>

    <!-- DONATE MODAL -->
    <div class="donate-overlay" id="donateOverlay">
        <div class="donate-portal-modal">
            <span class="close-portal" onclick="closeDonate()">✕</span>
            <div class="donate-icon">⚡</div>
            <h2 style="color: var(--accent); font-size: 28px;">ỦNG HỘ</h2>
            <p style="color: white; margin: 20px 0;">Mình đã tạo ra vũ trụ này bằng tất cả tâm huyết</p>
            
            <div class="bank-card">
                <div class="bank-row">
                    <span class="bank-label">🏦 MB Bank</span>
                    <span class="bank-value">0985 658 044</span>
                </div>
                <div class="bank-row">
                    <span class="bank-label">👤 Chủ TK</span>
                    <span class="bank-value">TRƯƠNG ĐÌNH CƯỜNG</span>
                </div>
                <div class="bank-row">
                    <span class="bank-label">📱 Zalo Pay</span>
                    <span class="bank-value">0985 658 044</span>
                </div>
            </div>

            <div class="thanks-quantum">
                CẢM ƠN BẠN! ✨
            </div>
        </div>
    </div>

    <!-- RESULT MODAL -->
    <div class="result-quantum" id="resultModal">
        <div class="result-card-quantum">
            <div style="font-size: 50px;">📊</div>
            <h2 style="color: var(--gold); margin: 20px 0;">KẾT QUẢ</h2>
            <div class="result-score-quantum" id="resultScore">0/0</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;">
                <div>
                    <div style="color: var(--accent);">TRẮC NGHIỆM</div>
                    <div style="color: white; font-size: 24px; font-weight: 700;" id="resultTN">0/50</div>
                </div>
                <div>
                    <div style="color: var(--accent);">ĐÚNG/SAI</div>
                    <div style="color: white; font-size: 24px; font-weight: 700;" id="resultDS">0/28</div>
                </div>
            </div>
            <button onclick="closeResult()" style="padding: 15px 40px; background: var(--accent); border: none; border-radius: 30px; color: var(--primary); font-weight: 700; cursor: pointer;">ĐÓNG</button>
        </div>
    </div>

    <script>
        // DỮ LIỆU TRẮC NGHIỆM (50 CÂU)

            { id: 42, question: "Theo quy định của pháp luật, quyền bình đẳng giữa các dân tộc trong lĩnh vực chính trị thể hiện ở việc các dân tộc trong cộng đồng dân tộc Việt Nam đều có quyền", options: ["A. tham gia phát triển du lịch cộng đồng.", "B. hỗ trợ chi phí học tập đại học.", "C. khám chữa bệnh theo quy định.", "D. tham gia quản lý nhà nước và xã hội."], correct: 3 },

            { id: 44, question: "Ở nước ta hiện nay thực hiện tốt việc đoàn kết giữa các dân tộc sẽ góp phần đấu tranh làm thất bại âm mưu của các thế lực thù địch nhằm phá hoại", options: ["A. các nền kinh tế mới nổi.", "B. đoàn kết giữa các dân tộc.", "C. tình đoàn kết quốc tế.", "D. chính sách độc quyền."], correct: 1 },

            { id: 46, question: "Việc làm nào dưới đây góp phần thực hiện quyền bình đẳng giữa các tôn giáo?", options: ["A. Xuyên tạc nội dung tôn giáo.", "B. Chia rẽ người theo Đạo.", "C. Phá hoại kiến trúc tôn giáo.", "D. Xóa bỏ tôn giáo bất hợp pháp."], correct: 3 },

            { id: 48, question: "Việc làm nào dưới đây thể hiện công dân thực hiện tốt nghĩa vụ tham gia quản lý nhà nước và xã hội?", options: ["A. Chủ động chuyển đổi số.", "B. Tiếp cận thông tin khoa học.", "C. Sử dụng dịch vụ công cộng.", "D. Giữ gìn an ninh trật tự."], correct: 3 },
            { id: 49, question: "Theo quy định của pháp luật, tại thời điểm tổ chức bầu cử, cử tri không vi phạm quyền và nghĩa vụ của công dân về bầu cử khi", options: ["A. độc lập lựa chọn ứng cử viên.", "B. công khai nội dung đã viết vào phiếu bầu.", "C. tự ý bỏ phiếu thay người khác.", "D. ủy quyền thực hiện nghĩa vụ bầu cử."], correct: 0 },
            { id: 50, question: "Theo quy định của pháp luật, hành vi nào dưới đây không vi phạm quyền và nghĩa vụ của công dân về bầu cử, ứng cử?", options: ["A. Chia sẻ lý lịch ứng cử viên.", "B. Chia sẻ nội dung phiếu bầu.", "C. Mua chuộc phiếu bầu cho mình.", "D. Bỏ phiếu thay người khác."], correct: 0 }
        ];

        // DỮ LIỆU ĐÚNG/SAI (7 CÂU)
        const dsData = [
            {
                id: 1,
                text: "Trong đợt kiểm tra đột xuất trên địa bàn xã H, Đội quản lí thị trường huyện T phát hiện 2 cửa hàng kinh doanh đang bán hàng hoá nhập lậu. Cửa hàng của bà X bán đồ chơi điện tử nhập lậu trị giá 40 triệu đồng; cửa hàng của bà Y bán rượu, thuốc lá nhập lậu trị giá 60 triệu đồng. Căn cứ vào mức độ vi phạm của mỗi cửa hàng, Đội trưởng Đội Quản lí thị trường huyện T đã lập biên bản xử phạt vi phạm hành chính đối với cửa hàng bà X và cửa hàng của bà Y.",
                statements: [
                    "a) Cửa hàng bà X và bà Y tham gia kinh doanh là bình đẳng về hưởng quyền.",
                    "b) Đội quản lí thị trường huyện T đã vi phạm quyền bình đẳng của công dân trước pháp luật.",
                    "c) Đội quản lí thị trường huyện T lập biên bản xử phạt vi phạm hành chính đối với 2 cửa hàng thể hiện công dân bình đẳng về trách nhiệm pháp lí.",
                    "d) Đội trưởng Đội quản lí thị trường xử phạt hành chính 2 cửa hàng của bà X và bà Y là đảm bảo sự tôn nghiêm của pháp luật."
                ],
                correct: [true, false, true, true]
            },
            {
                id: 2,
                text: "Công dân đã tham gia đóng góp ý kiến vào xây dựng văn bản quy phạm pháp luật: “việc lấy ý kiến nhân dân về dự thảo sửa đổi Hiến pháp 1992 đã được triển khai sâu rộng, thật sự tạo ra đợt sinh hoạt chính trị pháp lý quan trọng trong các tầng lớp nhân dân… các bộ, ngành, địa phương, hội, đoàn thể trong cả nước đã tiếp nhận khoảng 20 triệu lượt ý kiến góp ý về các nội dung của dự thảo sửa đổi Hiến pháp 1992”, “trên 6 triệu lượt ý kiến góp ý vào Dự thảo Luật Đất đai (sửa đổi)”. Công dân đã tham gia bàn và quyết định trực tiếp những vấn đề liên quan đến đời sống ở cơ sở như sinh sống, làm việc tại các địa phương, cơ quan: Phong trào xây dựng “Gia đình văn hóa”; thực hiện Quy chế dân chủ ở cơ sở”… Với hình thức gián tiếp, công dân tham gia quản lý nhà nước và xã hội thông qua Quốc hội, Hội đồng nhân dân các cấp, thông qua các tổ chức chính trị - xã hội, các tổ chức xã hội nghề nghiệp.",
                statements: [
                    "a) Việc công dân tham gia đóng góp ý kiến vào xây dựng văn bản quy phạm pháp luật không thuộc quyền và nghĩa vụ của công dân trong tham gia quản lý nhà nước và xã hội.",
                    "b) Công dân chỉ được thực hiện quyền tham gia quản lý nhà nước và xã hội khi tham gia bàn và quyết định trực tiếp những vấn đề liên quan đến đời sống ở cơ sở.",
                    "c) Công dân có thể thực hiện quyền tham gia quản lý nhà nước và xã hội thông qua Quốc hội, Hội đồng nhân dân các cấp.",
                    "d) Việc góp ý về các nội dung của dự thảo sửa đổi Hiến pháp 1992 là quyền của công dân trong tham gia quản lý nhà nước và xã hội."
                ],
                correct: [false, false, true, true]
            },
            {
                id: 3,
                text: "Vợ chồng bình đẳng với nhau trong quan hệ dân sự và các quan hệ khác liên quan đến hôn nhân và gia đình; có quyền, nghĩa vụ ngang nhau trong sở hữu tài sản chung, bình đẳng trong sử dụng nguồn thu nhập chung của vợ, chồng và quyết định các nguồn lực trong gia đình; bình đẳng với nhau trong quan hệ dân sự và các quan hệ khác liên quan đến hôn nhân và gia đình cũng như trong việc bàn bạc, quyết định lựa chọn và sử dụng biện pháp kế hoạch hoá gia đình phù hợp, sử dụng thời gian nghỉ chăm sóc con ốm theo quy định của pháp luật. Con trai, con gái được gia đình chăm sóc, giáo dục và tạo điều kiện như nhau để học tập, lao động, vui chơi, giải trí và phát triển.",
                statements: [
                    "a) Vợ và chồng có quyền và nghĩa vụ ngang nhau trong việc lựa chọn và sử dụng biện pháp kế hoạch hoá gia đình là bình đẳng giới trong quan hệ nhân thân.",
                    "b) Bình đẳng giới trong gia đình thể hiện ở việc giữa vợ và chồng đều có quyền và nghĩa vụ ngang nhau đối với tài sản chung.",
                    "c) Bình đẳng giới trong gia đình chỉ gắn liền với quyền bình đẳng giữa vợ và chồng trong quan hệ nhân thân và tài sản.",
                    "d) Đối với nguồn thu nhập chung của vợ và chồng thì cả hai đều có quyền ngang nhau trong việc sở hữu, sử dụng và định đoạt nó."
                ],
                correct: [true, true, false, true]
            }
        ];

        // BIẾN LƯU ĐÁP ÁN
        let tnAnswers = new Array(tnData.length).fill(null);
        let dsAnswers = {};

        // TẠO HẠT LƯỢNG TỬ
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = Math.random() * 20 + 10 + 's';
                container.appendChild(particle);
            }
        }

        // RENDER CÂU HỎI
        function renderQuestions() {
            const container = document.getElementById('content');
            let html = '';

            // TRẮC NGHIỆM
            html += '<div class="section"><div class="section-header"><div class="section-title">📝 TRẮC NGHIỆM</div><div class="section-count">50 câu</div></div>';
            tnData.forEach((q, index) => {
                html += `
                    <div class="quantum-card">
                        <div class="card-header">
                            <div class="q-number">${q.id}</div>
                            <div class="q-text">${q.question}</div>
                        </div>
                        <div class="options">
                            ${q.options.map((opt, optIdx) => `
                                <label class="option">
                                    <input type="radio" name="tn_${q.id}" value="${optIdx}" onchange="saveTN(${index}, ${optIdx})">
                                    <span>${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            // ĐÚNG/SAI
            html += '<div class="section"><div class="section-header"><div class="section-title">✅ ĐÚNG/SAI</div><div class="section-count">7 câu (28 ý)</div></div>';
            dsData.forEach(ds => {
                html += `
                    <div class="quantum-card">
                        <div style="background: rgba(100,255,218,0.05); padding: 20px; border-radius: 20px; margin-bottom: 20px; color: white; font-style: italic;">
                            ${ds.text}
                        </div>
                        ${ds.statements.map((stmt, idx) => `
                            <div class="statement-item">
                                <div class="statement-text">${stmt}</div>
                                <div class="statement-options">
                                    <label class="stmt-option">
                                        <input type="radio" name="ds_${ds.id}_${idx}" value="true" onchange="saveDS(${ds.id}, ${idx}, true)"> ĐÚNG
                                    </label>
                                    <label class="stmt-option">
                                        <input type="radio" name="ds_${ds.id}_${idx}" value="false" onchange="saveDS(${ds.id}, ${idx}, false)"> SAI
                                    </label>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            });
            html += '</div>';

            container.innerHTML = html;
        }

        // LƯU ĐÁP ÁN
        window.saveTN = function(index, value) {
            tnAnswers[index] = value;
            updateProgress();
        }

        window.saveDS = function(id, idx, value) {
            if (!dsAnswers[id]) dsAnswers[id] = {};
            dsAnswers[id][idx] = value;
            updateProgress();
        }

        // CẬP NHẬT TIẾN ĐỘ
        function updateProgress() {
            let tnCount = tnAnswers.filter(a => a !== null).length;
            let dsCount = 0;
            
            Object.values(dsAnswers).forEach(item => {
                dsCount += Object.keys(item).length;
            });

            const total = tnData.length + dsData.reduce((sum, q) => sum + q.statements.length, 0);
            const done = tnCount + dsCount;
            const percent = Math.round((done / total) * 100);
            
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
        }

        // NỘP BÀI
        window.submitExam = function() {
            let tnCorrect = tnAnswers.filter((ans, idx) => ans === tnData[idx]?.correct).length;
            
            let dsCorrect = 0;
            dsData.forEach(q => {
                if (dsAnswers[q.id]) {
                    for (let i = 0; i < q.statements.length; i++) {
                        if (dsAnswers[q.id][i] === q.correct[i]) dsCorrect++;
                    }
                }
            });

            const totalTN = tnData.length;
            const totalDS = dsData.reduce((sum, q) => sum + q.statements.length, 0);
            const total = totalTN + totalDS;
            const totalCorrect = tnCorrect + dsCorrect;

            document.getElementById('resultTN').textContent = `${tnCorrect}/${totalTN}`;
            document.getElementById('resultDS').textContent = `${dsCorrect}/${totalDS}`;
            document.getElementById('resultScore').textContent = `${totalCorrect}/${total}`;
            document.getElementById('resultModal').classList.add('show');
        }

        // ĐÓNG KẾT QUẢ
        window.closeResult = function() {
            document.getElementById('resultModal').classList.remove('show');
        }

        // POPUP DONATE
        window.showDonate = function() {
            document.getElementById('donateOverlay').classList.add('show');
        }

        window.closeDonate = function() {
            document.getElementById('donateOverlay').classList.remove('show');
        }

        // KHỞI TẠO
        createParticles();
        renderQuestions();

        // TỰ ĐỘNG HIỆN DONATE SAU 3 GIÂY
        setTimeout(() => {
            showDonate();
        }, 3000);
    </script>
</body>
</html>
